<svg
  xmlns="http://www.w3.org/2000/svg"
  width="128"
  height="128"
  viewBox="0 0 128 128"
  role="img"
  aria-labelledby="title description"
>
  <title id="title">Crewlight pulse mark</title>
  <desc id="description">
    An abstract pulse line inside a rounded local activity node.
  </desc>
  <defs>
    <linearGradient id="surface" x1="18" y1="16" x2="108" y2="114">
      <stop offset="0" stop-color="#172554" />
      <stop offset="0.55" stop-color="#312e81" />
      <stop offset="1" stop-color="#581c87" />
    </linearGradient>
    <linearGradient id="pulse" x1="26" y1="64" x2="102" y2="64">
      <stop offset="0" stop-color="#38bdf8" />
      <stop offset="0.5" stop-color="#a78bfa" />
      <stop offset="1" stop-color="#f472b6" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-80%" width="180%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="128" height="128" rx="32" fill="url(#surface)" />
  <rect
    x="8"
    y="8"
    width="112"
    height="112"
    rx="26"
    fill="none"
    stroke="#c4b5fd"
    stroke-opacity="0.22"
    stroke-width="2"
  />
  <circle cx="28" cy="64" r="4" fill="#38bdf8" />
  <circle cx="100" cy="64" r="4" fill="#f472b6" />
  <path
    d="M28 64h17l7-18 12 38 11-52 10 32h15"
    fill="none"
    stroke="url(#pulse)"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-width="7"
    filter="url(#glow)"
  />
</svg>
