name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node --version
      - run: pnpm format:check
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  standalone-linux-x64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build Linux x64 standalone artifact
        run: |
          node --version
          pnpm build:standalone
      - name: Record build provenance
        run: |
          {
            echo "## Linux x64 standalone build"
            echo '```text'
            cat release/crewlight-v0.4.0-linux-x64/BUILD-INFO.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Smoke test without Node or pnpm on PATH
        run: pnpm smoke:standalone
      - uses: actions/upload-artifact@v4
        with:
          name: crewlight-v0.4.0-linux-x64
          if-no-files-found: error
          path: |
            release/crewlight-v0.4.0-linux-x64.tar.gz
            release/crewlight-v0.4.0-linux-x64.tar.gz.sha256

  standalone-windows-x64:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.11.0
      - uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm
          architecture: x64
      - run: pnpm install --frozen-lockfile
      - name: Build Windows x64 standalone artifact
        shell: pwsh
        run: |
          node --version
          pnpm build:standalone
      - name: Record build provenance
        shell: pwsh
        run: |
          @(
            "## Windows x64 standalone build"
            '```text'
            (Get-Content release/crewlight-v0.4.0-windows-x64/BUILD-INFO.txt -Raw)
            '```'
          ) | Add-Content $env:GITHUB_STEP_SUMMARY
      - name: Smoke test without Node or pnpm on PATH
        shell: pwsh
        run: pnpm smoke:standalone:windows
      - uses: actions/upload-artifact@v4
        with:
          name: crewlight-v0.4.0-windows-x64
          if-no-files-found: error
          path: |
            release/crewlight-v0.4.0-windows-x64.zip
            release/crewlight-v0.4.0-windows-x64.zip.sha256
